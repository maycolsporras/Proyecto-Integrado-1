<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicid - Gestión de eventos administrador </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../css/index.css">
    <link rel="stylesheet" href="../../css/pages/gestion-admin.css">
</head>

<body>

<!-- Card de eventos pendientes de aprobación -->
                    <div class="container-fluid">
                        <div class="row mt-3">
                            <div class="col-12 eventosPendientesAprobacion">
                                <article class="eventoCardAprobacion" aria-label="Evento pendiente de aprobación">
                                    <div class="eventoCardAprobacionHeader">
                                        <p class="eventoCardTitulo">Publicación de Política Nacional de Discapacidad 2020 - 2030</p>
                                        <p class="eventoCardMeta"><span>Fecha del evento:</span> 30/12/2020</p>
                                    </div>

                                    <div class="eventoCardAprobacionBody row g-2 align-items-end">
                                        <div class="eventoCardInfo col-12 col-sm">
                                            <p class="eventoCardMeta"><span>Autor:</span> Nombre Apellido Apellido</p>
                                            <p class="eventoCardMeta"><span>Fecha para publicación:</span> 22/12/2020</p>
                                        </div>

                                        <div class="eventoCardAcciones col-12 col-sm-auto d-flex justify-content-sm-end" aria-label="Acciones del evento">
                                            <button class="btn eventoCardBtnIcon" type="button" aria-label="Ver evento">
                                                <i class="fa-regular fa-eye" aria-hidden="true"></i>
                                            </button>
                                            <button class="btn eventoCardBtnIcon" type="button" aria-label="Editar evento">
                                                <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                                            </button>
                                            <button class="btn eventoCardBtnIcon" type="button" aria-label="Eliminar evento">
                                                <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
                                            </button>
                                        </div>
                                    </div>
                                </article>
                            </div>
                            <div class="col-12">
                                <div class="eventoCardDecision" aria-label="Aprobar o rechazar evento">
                                    <button class="btn eventoCardDecisionBtn eventoCardDecisionBtnReject" type="button"
                                        aria-label="Rechazar evento">
                                        <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                                    </button>
                                    <button class="btn eventoCardDecisionBtn eventoCardDecisionBtnApprove" type="button"
                                        aria-label="Aprobar evento">
                                        <i class="fa-solid fa-check" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
<!-- fin de card de eventos pendientes de aprobación -->



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
