<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicid - Gestión de eventos administrador </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../../css/index.css">
    <link rel="stylesheet" href="../../css/pages/gestion-admin.css">
</head>

<body>

    <!-- Cards lsista difusion aprobadas -->
    <div class="row border-bottom border-1 border-secondary-subtle ">
        <div class="col-12">
            <div class="eventoCardPublicada d-flex justify-content-between p-3" aria-label="Evento publicado">
                <div class="eventoCardPublicadaHeader ms-5">
                    <p class="eventoCardPublicadaTitulo fw-bold">Nombre de Usuario</p>
                    <p class="eventoCardPublicadaMeta"><span>Profesión u oficio:</span> psicologo   
                    </p>
                    <p class="eventoCardPublicadaMeta"><span>Entidad a la que pertenece:</span> IMAS
                    </p>
                    <p class="eventoCardPublicadaMeta"><span>Listas de difusión:</span> lista de difusión 1, lista de difusión 2, lista de difusión 3
                    </p>
                </div>

                <div class="eventoCardPublicadaAcciones mt-3" aria-label="Acciones del evento publicado">
                    <button class="btn eventoCardBtnIcon" type="button" aria-label="Editar evento">
                        <i class="fa-regular fa-pen-to-square" aria-hidden="true"></i>
                    </button>
                    <button class="btn eventoCardBtnIcon" type="button" aria-label="Eliminar evento">
                        <i class="fa-regular fa-trash-can" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- fin cards listas de difusion aprobadas -->



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
