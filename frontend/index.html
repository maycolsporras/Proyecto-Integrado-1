    <header class="headerLandingPage py-3">
        <div class="container-fluid">
            <div class="row align-items-center mx-lg-5">
                <!-- Logo -->
                <div class="logoSicid col-12 col-md-2 col-lg-6 d-flex align-items-center gap-3">
                    <img src="./assets/img/logosicid.webp" alt="Logo de Sicid">
                    <p class="d-block d-md-none d-lg-block"><strong>Sistema Costarricense de<br>Información sobre Discapacidad</strong></p>
                </div>

                <div class="col-12 col-md-10 col-lg-6">
                    <div class="row d-flex flex-column flex-md-row align-items-center justify-content-end ms-md-1 ms-lg-0 me-1 me-md-0 gap-2 gap-md-0">
                        <!-- Selección de idioma -->
                        <div class="col-12 col-md-3 d-flex gap-2 align-items-center">
                            <label for="idioma">Idioma:</label>
                            <select class="form-select form-select-lg w-auto" id="idioma">
                                <option class="selected" value="es">ES</option>
                                <option value="en">EN</option>
                            </select>
                        </div>
                        <!-- Botones de tamaño de fuente -->
                        <div class="col-12 col-md-4 d-flex align-items-center gap-2">
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-minus p-2"></i>
                            </button>
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-a p-2"></i>
                            </button>
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-plus p-2"></i>
                            </button>
                        </div>
                        <!-- Botón de contraste-->
                        <div class="col-12 col-md-1 ">
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-circle-half-stroke p-2"></i>
                            </button>
                        </div>
                        <!-- Botón de inicio de sesión -->
                        <div class="col-12 col-md-4 d-flex justify-content-start justify-content-md-end">
                            <button class="btn btnIniciarSesion btn-lg">Iniciar sesión</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
