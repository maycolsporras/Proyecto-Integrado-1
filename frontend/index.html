<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicid - Sistema Costarricense de Información Sobre Discapacidad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

<body>
    <header class="headerLandingPage py-3">
        <div class="container-fluid">
            <div class="row align-items-center mx-5">
                <!-- Logo -->
                <div class="logoSicid col-6 d-flex align-items-center gap-3">
                    <img src="./assets/img/logosicid.webp" alt="Logo de Sicid">
                    <p><strong>Sistema Costarricense de<br>Información sobre Discapacidad</strong></p>
                </div>

                <div class="col-6">
                    <div class="row d-flex align-items-center justify-content-end">
                        <!-- Selección de idioma -->
                        <div class="col-3 d-flex gap-2 align-items-center">
                            <label for="idioma">Idioma:</label>
                            <select class="form-select form-select-lg w-auto" id="idioma">
                                <option class="selected" value="es">ES</option>
                                <option value="en">EN</option>
                            </select>
                        </div>
                        <!-- Botones de tamaño de fuente -->
                        <div class="col-4 d-flex align-items-center gap-2">
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-minus p-2"></i>
                            </button>
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-a p-2"></i>
                            </button>
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-plus p-2"></i>
                            </button>
                        </div>
                        <!-- Botón de contraste-->
                        <div class="col-1 ">
                            <button class="btn btnHeader">
                                <i class="fa-solid fa-circle-half-stroke p-2"></i>
                            </button>
                        </div>
                        <!-- Botón de inicio de sesión -->
                        <div class="col-4 d-flex justify-content-end">
                            <button class="btn btnIniciarSesion btn-lg">Iniciar sesión</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <nav class="navbar">
        <div class="container-fluid">
                <ul class="navbar-nav d-flex flex-row justify-content-around align-items-center w-100">
                    <li class="nav-item">
                        <a class="nav-link text-white"  href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">SICID</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Certificaciones</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Formación</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white text-wrap-nav" href="#">Productos y Servicios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Estadísticas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">PONADIS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#">Comisiones</a>
                    </li>
                    <li class="nav-item dropdown position-relative">
                        <a class="nav-link dropdown-toggle text-white text-wrap-nav" href="#" role="button" data-bs-toggle="dropdown">
                            Noticias y Eventos
                        </a>
                        <ul class="dropdown-menu position-absolute p-0 m-0">
                            <li><a class="dropdown-item position-relative py-2" href="#"><strong>Noticias</strong></a></li>
                            <li><hr class="dropdown-divider p-0 m-0"></li>
                            <li><a class="dropdown-item position-relative py-2" href="#"><strong>Eventos</strong></a></li>
                        </ul>
                    </li>
                </ul>
        </div>
    </nav>

    </main>
